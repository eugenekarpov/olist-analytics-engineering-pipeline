name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  python-unit:
    name: Python unit and fixture contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall airflow/dags scripts tests

      - name: Validate small fixture contract
        run: >-
          python scripts/utilities/validate_source_contract.py
          --archive tests/fixtures/olist_small/olist_small.zip
          --profile tests/fixtures/olist_small/source_profile_small.json

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v

  dbt-static:
    name: dbt parse
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/olist_analytics
      DBT_TARGET: local_pg
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: olist_analytics
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Parse dbt project
        run: dbt parse --no-partial-parse --show-all-deprecations
        working-directory: dbt/olist_analytics
