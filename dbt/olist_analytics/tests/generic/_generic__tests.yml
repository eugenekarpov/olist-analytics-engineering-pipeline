version: 2

macros:
  - name: test_non_negative
    description: Assert that a numeric column has no values below zero.
    arguments:
      - name: model
        type: relation
        description: Relation containing the column under test.
      - name: column_name
        type: column
        description: Numeric column that should be zero or greater.

  - name: test_unique_combination_of_columns
    description: Assert that each configured column combination appears once.
    arguments:
      - name: model
        type: relation
        description: Relation containing the column combination under test.
      - name: combination_of_columns
        type: list
        description: Columns that should form a unique record grain.
