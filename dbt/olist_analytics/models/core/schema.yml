version: 2

models:
  - name: dim_date
    description: Date dimension based on order lifecycle dates.
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: date_day
        tests:
          - not_null
          - unique
  - name: dim_order_status
    description: Order status reference dimension.
    columns:
      - name: order_status_key
        tests:
          - not_null
          - unique
      - name: order_status
        tests:
          - not_null
          - unique
  - name: dim_seller
    description: Type 1 seller dimension.
    columns:
      - name: seller_key
        tests:
          - not_null
          - unique
      - name: seller_id
        tests:
          - not_null
          - unique
  - name: dim_customer_scd2
    description: SCD2 customer dimension produced from dbt snapshot records.
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
  - name: dim_product_scd2
    description: SCD2 product dimension produced from dbt snapshot records.
    columns:
      - name: product_key
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
  - name: fact_order_items
    description: Incremental item-grain fact table with SCD2 dimension joins.
    tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id
    columns:
      - name: order_item_key
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: customer_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_customer_scd2')
                field: customer_key
      - name: product_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_product_scd2')
                field: product_key
      - name: seller_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_seller')
                field: seller_key
      - name: order_status_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_order_status')
                field: order_status_key
      - name: price
        tests:
          - not_null
          - non_negative
      - name: freight_value
        tests:
          - not_null
          - non_negative
      - name: gross_item_amount
        tests:
          - not_null
          - non_negative
      - name: allocated_payment_value
        tests:
          - non_negative
